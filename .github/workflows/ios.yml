name: iOS Build & Upload to TestFlight

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode Version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install Apple Certificate and Provisioning Profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # Decode certificate and provisioning profile from secrets
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH

        # Create and unlock a temporary secure keychain
        security create-keychain -p "temporary_password" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "temporary_password" $KEYCHAIN_PATH

        # Import P12 certificate into keychain
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # Install the Provisioning Profile in the standard library folder
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

    - name: Generate Native iOS Directory (Expo Prebuild)
      run: npx expo prebuild --platform ios --no-install

    - name: Install CocoaPods Dependencies
      run: |
        cd ios
        pod repo update
        pod install

    - name: Inject Production Code Signing Settings
      env:
        TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      run: |
        # Inject explicit Team ID, Manual signing, and Provisioning Profile name directly to project config
        sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $TEAM_ID;/g" ios/athar.xcodeproj/project.pbxproj
        sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" ios/athar.xcodeproj/project.pbxproj
        sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" ios/athar.xcodeproj/project.pbxproj
        sed -i '' "s/CODE_SIGN_IDENTITY = \"iPhone Developer\";/CODE_SIGN_IDENTITY = \"Apple Distribution\";/g" ios/athar.xcodeproj/project.pbxproj

    - name: Create ExportOptions.plist
      env:
        TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      run: |
        cat <<EOF > ios/ExportOptions.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.athar.app</key>
                <string>$PROFILE_NAME</string>
            </dict>
            <key>signingCertificate</key>
            <string>iOS Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
        </dict>
        </plist>
        EOF

    - name: Build Archive & IPA via xcodebuild
      run: |
        cd ios
        xcodebuild -workspace athar.xcworkspace \
                   -scheme athar \
                   -configuration Release \
                   -sdk iphoneos \
                   -archivePath $RUNNER_TEMP/athar.xcarchive \
                   archive
        
        xcodebuild -exportArchive \
                   -archivePath $RUNNER_TEMP/athar.xcarchive \
                   -exportOptionsPlist ExportOptions.plist \
                   -exportPath $RUNNER_TEMP/build

    - name: Locate Exported IPA File
      id: find_ipa
      run: |
        IPA_FILE=$(find $RUNNER_TEMP/build -name "*.ipa" | head -n 1)
        echo "ipa_path=$IPA_FILE" >> $GITHUB_OUTPUT
        echo "Found IPA at: $IPA_FILE"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-ipa
        path: ${{ steps.find_ipa.outputs.ipa_path }}

    - name: Upload to Apple TestFlight
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-path: ${{ steps.find_ipa.outputs.ipa_path }}
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
